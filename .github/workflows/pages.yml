name: Deploy to GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Get release tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ -z "$TAG" ]]; then
            TAG=$(gh release view --repo ${{ github.repository }} --json tagName --jq .tagName)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Cache release databases
        id: cache-db
        uses: actions/cache@v4
        with:
          path: web/*.db.gz
          key: release-db-${{ steps.release.outputs.tag }}

      - name: Download release assets
        if: steps.cache-db.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download --repo ${{ github.repository }} --tag ${{ steps.release.outputs.tag }} --pattern "*.db.gz" --dir web/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: web/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
