name: Build and release databases

on:
  push:
    tags:
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. 2026.03.14)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install system dependencies
        run: sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Cache downloaded wordnet data
        uses: actions/cache@v4
        with:
          path: bin/
          key: wordnet-data-${{ hashFiles('build.sh') }}
          restore-keys: wordnet-data-

      - name: Download wordnet data
        run: bash build.sh --download-only

      - name: Build databases
        run: bash build.sh --build-only --skip-tests

      - name: Set release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, uploading assets only"
            gh release upload "$TAG" web/cygnet.db.gz web/provenance.db.gz --clobber
          else
            gh release create "$TAG" \
              --title "Cygnet $TAG" \
              --generate-notes \
              --target "${{ github.sha }}" \
              web/cygnet.db.gz \
              web/provenance.db.gz
          fi

